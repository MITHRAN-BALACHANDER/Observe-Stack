server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: observastack
    batchwait: 1s
    batchsize: 1048576

scrape_configs:

  # Docker container log collection via Docker socket discovery
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      # Use container name as the service label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: service

      # Capture container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: container_id

      # Forward compose project label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project

      # Forward compose service label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service

      # Log format tag
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream

    pipeline_stages:
      # Parse JSON logs emitted by Winston
      - json:
          expressions:
            level: level
            message: message
            service: service
            timestamp: timestamp
            correlationId: correlationId
            requestId: requestId

      # Extract log level for label
      - labels:
          level:
          service:

      # Use Winston timestamp as log timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.000Z"
            - "2006-01-02T15:04:05Z"

      # Drop healthcheck polling noise — match only the exact health endpoint path
      - drop:
          expression: '"path":"/health"'
          drop_counter_reason: healthcheck_noise

  # Fallback: collect system logs from /var/log
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          service: host
          __path__: /var/log/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\S+ \S+) (?P<level>\w+) (?P<service>\S+)?: (?P<message>.*)'
      - labels:
          level:
          service:
