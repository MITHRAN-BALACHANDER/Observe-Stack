global:
  resolve_timeout: 5m

# Routing tree — critical alerts page immediately; warnings batch hourly
route:
  receiver: 'discord-critical'
  group_by: ['alertname', 'job', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity = "critical"
      receiver: 'discord-critical'
      group_wait: 10s
      repeat_interval: 1h

    - matchers:
        - severity = "warning"
      receiver: 'discord-warnings'
      group_wait: 60s
      repeat_interval: 4h

receivers:
  - name: 'discord-critical'
    webhook_configs:
      - url: 'https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN'
        send_resolved: true
        http_config:
          follow_redirects: true
        title: '🔴 [CRITICAL] ObservaStack Alert'
        text: |
          {{ range .Alerts }}
          **Alert:** {{ .Annotations.summary }}
          **Details:** {{ .Annotations.description }}
          **Service:** {{ .Labels.job }}
          **Started:** {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}

  - name: 'discord-warnings'
    webhook_configs:
      - url: 'https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN'
        send_resolved: true
        title: '⚠️ [WARNING] ObservaStack Alert'
        text: |
          {{ range .Alerts }}
          **Alert:** {{ .Annotations.summary }}
          **Details:** {{ .Annotations.description }}
          **Service:** {{ .Labels.job }}
          {{ end }}

inhibit_rules:
  # ServiceDown inhibits all other alerts for the same job
  - source_matchers:
      - alertname = "ServiceDown"
    target_matchers:
      - alertname != "ServiceDown"
    equal: ['job']
