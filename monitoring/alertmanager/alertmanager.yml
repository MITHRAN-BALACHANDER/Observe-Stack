global:
  resolve_timeout: 5m

# Routing tree — critical alerts page immediately; warnings batch hourly
route:
  receiver: 'discord-critical'
  group_by: ['alertname', 'job', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity = "critical"
      receiver: 'discord-critical'
      group_wait: 10s
      repeat_interval: 1h

    - matchers:
        - severity = "warning"
      receiver: 'discord-warnings'
      group_wait: 60s
      repeat_interval: 4h

receivers:
  - name: 'discord-critical'
    discord_configs:
      - webhook_url: '${DISCORD_WEBHOOK_URL}'
        send_resolved: true
        title: '[CRITICAL] ObservaStack Alert'
        message: |
          {{ range .Alerts }}
          **Alert:** {{ .Annotations.summary }}
          **Details:** {{ .Annotations.description }}
          **Service:** {{ if .Labels.job }}{{ .Labels.job }}{{ else }}unknown{{ end }}
          **Severity:** {{ if .Labels.severity }}{{ .Labels.severity }}{{ else }}unknown{{ end }}
          **Started:** {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}

  - name: 'discord-warnings'
    discord_configs:
      - webhook_url: '${DISCORD_WEBHOOK_URL}'
        send_resolved: true
        title: '[WARNING] ObservaStack Alert'
        message: |
          {{ range .Alerts }}
          **Alert:** {{ .Annotations.summary }}
          **Details:** {{ .Annotations.description }}
          **Service:** {{ if .Labels.job }}{{ .Labels.job }}{{ else }}unknown{{ end }}
          **Severity:** {{ if .Labels.severity }}{{ .Labels.severity }}{{ else }}unknown{{ end }}
          {{ end }}

inhibit_rules:
  # ServiceDown inhibits application-level alerts for the same job, but NOT
  # infrastructure alerts (CPU, memory, disk) — those explain WHY a service went down.
  - source_matchers:
      - alertname = "ServiceDown"
    target_matchers:
      - alertname =~ "ContainerRestart|ErrorRateSpike|HighLatency|QueueBacklog"
    equal: ['job']
