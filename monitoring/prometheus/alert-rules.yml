groups:
  - name: service_alerts
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: node_cpu_seconds_total{mode="system"} > 0.8
        for: 5m
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80%"

      - alert: HighMemoryUsage
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.1
        for: 5m
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 90%"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        annotations:
          summary: "Service is down"
          description: "Service {{ $labels.job }} is not responding"

      - alert: HighErrorRate
        expr: rate(http_requests_failed[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        annotations:
          summary: "High error rate"
          description: "Error rate is above 5%"

      - alert: HighLatency
        expr: histogram_quantile(0.95, http_request_duration_seconds_bucket) > 1
        for: 5m
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is above 1s"

  - name: business_alerts
    interval: 1m
    rules:
      - alert: OrderProcessingBacklog
        expr: order_queue_size > 100
        for: 10m
        annotations:
          summary: "Order queue backlog"
          description: "Order queue size is {{ $value }}"
