name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            path: gateway
            test_cmd: npm test
          - service: auth-service
            path: services/auth-service
            test_cmd: npm test
          - service: order-service
            path: services/order-service
            test_cmd: npm test
          - service: notification-service
            path: services/notification-service
            test_cmd: npm test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Audit dependencies
        working-directory: ${{ matrix.path }}
        run: npm audit --audit-level=high

      - name: Run tests with coverage
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.test_cmd }}
        env:
          NODE_ENV: test
          LOG_LEVEL: error
          JWT_SECRET: test-secret-do-not-use-in-prod
          FAILURE_RATE: '0'
          AUTH_SERVICE_URL: http://localhost:3001
          ORDER_SERVICE_URL: http://localhost:3002
          NOTIFICATION_SERVICE_URL: http://localhost:3003

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          directory: ${{ matrix.path }}/coverage
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

  docker-build-check:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-and-test

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            context: gateway
          - service: auth-service
            context: services/auth-service
          - service: order-service
            context: services/order-service
          - service: notification-service
            context: services/notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          push: false
          tags: observastack/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-configs:
    name: Validate Monitoring Configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.48.1 \
            promtool check config /etc/prometheus/prometheus.yml

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.48.1 \
            promtool check rules /etc/prometheus/alert-rules.yml

      - name: Validate Prometheus recording rules
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.48.1 \
            promtool check rules /etc/prometheus/recording-rules.yml

      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/monitoring/alertmanager:/etc/alertmanager:ro" \
            -e DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/000000000000000000/placeholder \
            prom/alertmanager:v0.26.0 \
            amtool check-config /etc/alertmanager/alertmanager.yml
