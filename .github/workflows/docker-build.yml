name: Docker Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service:
          - gateway
          - auth-service
          - order-service
          - notification-service
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Registry
      uses: docker/login-action@v2
      with:
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push service
      uses: docker/build-push-action@v4
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: |
          docker.io/${{ secrets.DOCKER_USERNAME }}/observability-${{ matrix.service }}:latest
          docker.io/${{ secrets.DOCKER_USERNAME }}/observability-${{ matrix.service }}:${{ github.sha }}
        cache-from: type=registry,ref=docker.io/${{ secrets.DOCKER_USERNAME }}/observability-${{ matrix.service }}:buildcache
        cache-to: type=registry,ref=docker.io/${{ secrets.DOCKER_USERNAME }}/observability-${{ matrix.service }}:buildcache,mode=max
