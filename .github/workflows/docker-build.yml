name: Docker Publish

on:
  push:
    tags: ['v*']

# Publishing to Docker Hub only happens on semver tags (e.g. v1.0.0).
# Push to main runs the build-check job inside ci.yml instead.
# Requires repository secrets: DOCKER_USERNAME, DOCKER_PASSWORD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-credentials:
    name: Check Docker credentials
    runs-on: ubuntu-latest
    outputs:
      has-creds: ${{ steps.check.outputs.has-creds }}
    steps:
      - name: Verify secrets are set
        id: check
        run: |
          if [[ -n "${{ secrets.DOCKER_USERNAME }}" && -n "${{ secrets.DOCKER_PASSWORD }}" ]]; then
            echo "has-creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-creds=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKER_USERNAME or DOCKER_PASSWORD secret is not set. Skipping publish."
          fi

  publish:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.has-creds == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            context: gateway
          - service: auth-service
            context: services/auth-service
          - service: order-service
            context: services/order-service
          - service: notification-service
            context: services/notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/observastack-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/observastack-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/observastack-${{ matrix.service }}:buildcache,mode=max
